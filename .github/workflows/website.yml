name: Website

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: website-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/eclipsa/compiler/rust

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build optimizer native artifacts
        run: bun run --filter @eclipsa/optimizer build:native:dev

      - name: Build website
        run: bun run --cwd docs build

      - name: Resolve preview metadata
        if: ${{ github.event_name == 'pull_request' }}
        id: preview
        shell: bash
        run: |
          echo "alias=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Deploy preview
        if: ${{ github.event_name == 'pull_request' }}
        id: deploy_preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: docs
          command: versions upload --preview-alias ${{ steps.preview.outputs.alias }}

      - name: Comment preview URL
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_ALIAS: ${{ steps.preview.outputs.alias }}
          WORKER_NAME: eclipsa
          WRANGLER_OUTPUT: ${{ steps.deploy_preview.outputs.command-output }}
          WRANGLER_STDERR: ${{ steps.deploy_preview.outputs.command-stderr }}
        with:
          script: |
            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
            const alias = process.env.PREVIEW_ALIAS
            const workerName = process.env.WORKER_NAME
            const wranglerText = [process.env.WRANGLER_OUTPUT, process.env.WRANGLER_STDERR]
              .filter(Boolean)
              .join('\n')

            const aliasPattern = new RegExp(
              `https://${escapeRegex(alias)}-${escapeRegex(workerName)}\\.[^\\s)]+\\.workers\\.dev`,
              'i',
            )
            const previewUrl =
              wranglerText.match(aliasPattern)?.[0] ??
              wranglerText.match(/https:\/\/[a-z0-9-]+(?:\.[a-z0-9-]+)*\.workers\.dev/gi)?.[0]

            if (!previewUrl) {
              throw new Error(`Could not find preview URL in Wrangler output:\n${wranglerText}`)
            }

            const marker = '<!-- eclipsa-website-preview -->'
            const body = [
              marker,
              `Website preview: ${previewUrl}`,
              '',
              `Commit: ${context.payload.pull_request.head.sha.slice(0, 7)}`,
            ].join('\n')

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const existing = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            })

      - name: Deploy production
        if: ${{ github.event_name == 'push' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: docs
          command: deploy
