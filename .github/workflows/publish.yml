name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - eclipsa
          - create-eclipsa
          - image
      release_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - alpha-patch
          - alpha-minor
          - alpha-major
          - beta-patch
          - beta-minor
          - beta-major

permissions:
  id-token: write
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-${{ inputs.package }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
      PACKAGE_KEY: ${{ inputs.package }}
      INPUT_RELEASE_TYPE: ${{ inputs.release_type }}
    outputs:
      build_command: ${{ steps.package.outputs.build_command }}
      npm_tag: ${{ steps.metadata.outputs.npmTag }}
      package_json_path: ${{ steps.package.outputs.package_json_path }}
      publish_dir: ${{ steps.package.outputs.publish_dir }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve package paths
        id: package
        shell: bash
        run: |
          case "$PACKAGE_KEY" in
            eclipsa)
              package_json_path="packages/eclipsa/package.json"
              publish_dir="packages/eclipsa"
              build_command="bun run --filter eclipsa build:js"
              ;;
            create-eclipsa)
              package_json_path="packages/create-eclipsa/package.json"
              publish_dir="packages/create-eclipsa"
              build_command=""
              ;;
            image)
              package_json_path="packages/image/package.json"
              publish_dir="packages/image"
              build_command=""
              ;;
            *)
              echo "Unsupported package: $PACKAGE_KEY"
              exit 1
              ;;
          esac

          if [ ! -r "$package_json_path" ]; then
            echo "package.json not found or not readable: $package_json_path"
            exit 1
          fi

          echo "package_json_path=$package_json_path" >> "$GITHUB_OUTPUT"
          echo "publish_dir=$publish_dir" >> "$GITHUB_OUTPUT"
          echo "build_command=$build_command" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          metadata_json="$(bun scripts/release/resolve-release-metadata.ts \
            --package-json '${{ steps.package.outputs.package_json_path }}' \
            --package-key "$PACKAGE_KEY" \
            --release-type "$INPUT_RELEASE_TYPE")"

          node -e "
          const data = JSON.parse(process.argv[1]);
          for (const [key, value] of Object.entries(data)) {
            process.stdout.write(\`\${key}=\${value}\n\`);
          }
          " "$metadata_json" >> "$GITHUB_OUTPUT"

      - name: Ensure release refs do not exist already
        shell: bash
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.metadata.outputs.tag }}" >/dev/null; then
            echo "Tag already exists: ${{ steps.metadata.outputs.tag }}"
            exit 1
          fi

          if gh release view "${{ steps.metadata.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release already exists: ${{ steps.metadata.outputs.tag }}"
            exit 1
          fi

      - name: Ensure workflow runs on branch
        shell: bash
        run: |
          if [[ '${{ github.ref_type }}' != 'branch' ]]; then
            echo "This workflow must run on a branch ref to push version updates."
            echo "Current ref_type: ${{ github.ref_type }}"
            exit 1
          fi

  build_eclipsa_bindings:
    if: ${{ inputs.package == 'eclipsa' }}
    needs: prepare
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target aarch64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target x86_64-unknown-linux-musl -x
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target aarch64-unknown-linux-musl -x
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
            build: bunx @napi-rs/cli build --platform --release --manifest-path ./compiler/rust/Cargo.toml --package-json-path ./package.json --target-dir ./compiler/rust/target --output-dir ./compiler/native/generated --js-package-name eclipsa --target wasm32-wasip1-threads
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Setup Zig
        if: ${{ contains(matrix.settings.target, 'musl') }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        if: ${{ contains(matrix.settings.target, 'musl') }}
        uses: taiki-e/install-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update package version for build
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const path = process.argv[1];
          const version = process.argv[2];
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          " 'packages/eclipsa/package.json' '${{ needs.prepare.outputs.version }}'

      - name: Build binding
        shell: bash
        working-directory: packages/eclipsa
        run: ${{ matrix.settings.build }}

      - name: Verify WASI binding entry
        if: ${{ matrix.settings.target == 'wasm32-wasip1-threads' }}
        shell: bash
        working-directory: packages/eclipsa
        run: |
          node -e "const binding = require('./compiler/native/generated/eclipsa.wasi.cjs'); if (typeof binding.compileClient !== 'function') { throw new Error('Expected compileClient export from WASI binding entry.'); }"

      - name: Upload binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/eclipsa/compiler/native/generated/*
          if-no-files-found: error

  publish_eclipsa:
    if: ${{ inputs.package == 'eclipsa' }}
    needs:
      - prepare
      - build_eclipsa_bindings
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update package version for publish
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const path = process.argv[1];
          const version = process.argv[2];
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = version;
          if (pkg.private === true) {
            pkg.private = false;
          }
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          " '${{ needs.prepare.outputs.package_json_path }}' '${{ needs.prepare.outputs.version }}'

      - name: Build JS package
        shell: bash
        run: bun run --filter eclipsa build:js

      - name: Generate root WASI loader assets
        shell: bash
        working-directory: packages/eclipsa
        run: bun run build:native -- --target wasm32-wasip1-threads

      - name: Create npm package directories
        shell: bash
        run: bun run --filter eclipsa create:npm-dirs

      - name: Download all binding artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/eclipsa/artifacts
          pattern: bindings-*
          merge-multiple: false

      - name: Sync npm package versions
        shell: bash
        run: bun run --filter eclipsa version:napi

      - name: Hydrate npm package artifacts
        shell: bash
        run: bun run --filter eclipsa artifacts

      - name: Publish eclipsa package
        shell: bash
        working-directory: packages/eclipsa
        run: |
          publish_args=(npm publish --provenance --access public)

          if [[ '${{ needs.prepare.outputs.npm_tag }}' != 'latest' ]]; then
            publish_args+=(--tag '${{ needs.prepare.outputs.npm_tag }}')
          fi

          "${publish_args[@]}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Restore development manifest
        shell: bash
        run: bun run --filter eclipsa restore:manifest

      - name: Commit and push version update
        id: version_commit
        shell: bash
        run: |
          file_path='${{ needs.prepare.outputs.package_json_path }}'

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add "$file_path"

          if git diff --cached --quiet; then
            echo "No version updates to commit."
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m 'chore(release): bump eclipsa to v${{ needs.prepare.outputs.version }}'
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release with generated notes
        shell: bash
        run: |
          gh release create '${{ needs.prepare.outputs.tag }}' \
            --generate-notes \
            --target '${{ steps.version_commit.outputs.sha }}'

  publish_other:
    if: ${{ inputs.package != 'eclipsa' }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update package version for publish
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const path = process.argv[1];
          const version = process.argv[2];
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = version;
          if (pkg.private === true) {
            pkg.private = false;
          }
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          " '${{ needs.prepare.outputs.package_json_path }}' '${{ needs.prepare.outputs.version }}'

      - name: Build package
        if: needs.prepare.outputs.build_command != ''
        shell: bash
        run: ${{ needs.prepare.outputs.build_command }}

      - name: Pack package tarball
        id: pack
        shell: bash
        run: |
          publish_dir='${{ needs.prepare.outputs.publish_dir }}'
          tarball_output="$(cd "$publish_dir" && bun pm pack --quiet --destination "$RUNNER_TEMP")"
          tarball_output="$(echo "$tarball_output" | tr -d '\r\n')"

          if [[ "$tarball_output" = /* ]]; then
            tarball_path="$tarball_output"
          else
            tarball_path="$RUNNER_TEMP/$tarball_output"
          fi

          if [[ ! -f "$tarball_path" ]]; then
            echo "Tarball was not generated at expected path: $tarball_path"
            exit 1
          fi

          echo "path=$tarball_path" >> "$GITHUB_OUTPUT"

      - name: Publish package tarball to npm
        shell: bash
        run: |
          publish_args=(npm publish '${{ steps.pack.outputs.path }}' --provenance --access public)

          if [[ '${{ needs.prepare.outputs.npm_tag }}' != 'latest' ]]; then
            publish_args+=(--tag '${{ needs.prepare.outputs.npm_tag }}')
          fi

          "${publish_args[@]}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and push version update
        id: version_commit
        shell: bash
        run: |
          file_path='${{ needs.prepare.outputs.package_json_path }}'

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add "$file_path"

          if git diff --cached --quiet; then
            echo "No version updates to commit."
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m 'chore(release): bump ${{ inputs.package }} to v${{ needs.prepare.outputs.version }}'
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release with generated notes
        shell: bash
        run: |
          gh release create '${{ needs.prepare.outputs.tag }}' \
            --generate-notes \
            --target '${{ steps.version_commit.outputs.sha }}'
