[package]
name = "eclipsa-native-gtk4-host"
version = "0.0.0"
edition = "2021"
publish = false

[features]
default = []
gtk-ui = ["dep:gdk-pixbuf", "dep:gtk4"]

[dependencies]
anyhow = "1.0.100"
gdk-pixbuf = { version = "0.21.5", optional = true }
gtk4 = { version = "0.10.3", optional = true }
rquickjs = "0.11.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tungstenite = { version = "0.28.0", default-features = true }
ureq = { version = "3.1.4", features = ["json"] }
url = "2.5.7"

[[bin]]
name = "eclipsa-native-gtk4"
path = "src/bin/eclipsa-native-gtk4.rs"
required-features = ["gtk-ui"]

[[bin]]
name = "eclipsa-native-gtk4-smoke"
path = "src/bin/eclipsa-native-gtk4-smoke.rs"
